name: Lint

# SwiftLint results posted inline on pull requests via reviewdog. Advisory
# only — warnings are surfaced as review comments, they don't block merging.
# Runs on Linux to stay within GitHub's free tier (macOS runners are paid).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  swiftlint:
    name: SwiftLint (reviewdog)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: |
          curl -L -o swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/0.65.0/swiftlint_linux_amd64.zip"
          unzip -o swiftlint.zip
          chmod +x swiftlint
          sudo mv swiftlint /usr/local/bin/swiftlint
          rm -f swiftlint.zip

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: latest

      - name: Run SwiftLint through reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          swiftlint lint --quiet --reporter checkstyle \
            | reviewdog -f=checkstyle -name=SwiftLint \
                -reporter=github-pr-check -level=warning -fail-level=none
