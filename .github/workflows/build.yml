name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (Core)
    # Runs the pure-logic test suite. Fast, no engine or app build needed.
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Run SideTerminalCore tests
        working-directory: app/Core
        run: swift test

  build:
    name: Build app bundle
    # macos-15 has a recent enough SDK for the engine; the full app links
    # macOS 26-only APIs, so its bundle step is informational until GitHub
    # ships a macOS 26 runner.
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig toolchain
        uses: actions/cache@v4
        with:
          path: tools/zig-aarch64-macos-0.15.2
          key: zig-0.15.2-${{ runner.os }}-${{ runner.arch }}

      - name: Bootstrap (fetch engine + Zig, build SDK shim)
        run: scripts/bootstrap.sh

      - name: Build engine library
        run: scripts/build-libghostty.sh

      - name: Verify engine library
        run: test -f ghostty/zig-out/lib/libghostty.a && echo "libghostty.a built."

      - name: Build app bundle (needs macOS 26 SDK; informational)
        id: bundle
        continue-on-error: true
        run: scripts/bundle-app.sh release

      - name: Package app
        if: steps.bundle.outcome == 'success'
        run: ditto -c -k --keepParent build/SideTerminal.app build/SideTerminal.app.zip

      - name: Upload app artifact
        if: steps.bundle.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: SideTerminal-app
          path: build/SideTerminal.app.zip
