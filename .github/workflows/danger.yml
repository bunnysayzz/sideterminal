name: Danger

# Custom PR-hygiene checks via Danger JS. Runs entirely inside GitHub Actions
# (no external app, no hosting) and posts one summary comment per PR.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  danger:
    name: PR checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 100
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run Danger
        run: npx --yes danger@12 ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
